<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитика - ShareWiki</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-card { background: #f8f9fa; border: 1px solid #a7d7f9; padding: 20px; margin-bottom: 20px; border-radius: 4px; text-align: center; }
        .total-counter { font-size: 2.5em; font-weight: bold; color: #36c; margin-top: 10px; }
        .bar-outer { width: 100%; background: #eee; height: 14px; border-radius: 7px; margin-top: 8px; overflow: hidden; }
        .bar-inner { height: 100%; background: #36c; width: 0%; transition: width 0.8s ease-out; }
        .page-item { margin-bottom: 25px; padding: 10px; border-bottom: 1px dashed #ccc; }
        .leader { color: #d33; font-weight: bold; text-transform: uppercase; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ShareWiki</h2>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="lesha.html">Леха</a></li>
            <li><a href="bblonde.html">bblonde</a></li>
            <li><a href="r34.html">@r34</a></li>
            <li><a href="amnesia.html">amnesia</a></li>
            <li><a href="revolution.html">Революция</a></li>
            <li><a href="analytics.html">📊 Аналитика</a></li>
        </ul>
    </div>
    <div class="content">
        <h1>📊 Подробная аналитика</h1>
        
        <div class="stats-card">
            <strong>Всего прочтений архива:</strong>
            <div id="total-views" class="total-counter">Загрузка...</div>
        </div>

        <div id="analytics-list">Стучимся в базу данных Share...</div>
    </div>

    <script>
        const pages = [
            { id: 'lesha', name: 'Леха (Навальный Киви)' },
            { id: 'bblonde', name: 'bblonde (Наггетсы)' },
            { id: 'r34', name: '@r34 (Подарки)' },
            { id: 'amnesia', name: 'amnesia (Создатель)' },
            { id: 'revolution', name: 'Революция из-за приложения' }
        ];

        async function getStats() {
            const list = document.getElementById('analytics-list');
            const totalEl = document.getElementById('total-views');
            let results = [];
            let totalSum = 0;

            for (const p of pages) {
                try {
                    // Используем API counterapi.dev
                    const resp = await fetch(`https://api.counterapi.dev/v1/ShareWiki/${p.id}`);
                    const json = await resp.json();
                    const count = json.count || 0;
                    results.push({ name: p.name, count: count });
                    totalSum += count;
                } catch (err) {
                    results.push({ name: p.name, count: 0 });
                }
            }

            // Сортировка по убыванию
            results.sort((a, b) => b.count - a.count);
            
            const max = results[0].count || 1;
            totalEl.innerText = totalSum;
            list.innerHTML = '';

            results.forEach((item, i) => {
                const percent = (item.count / max) * 100;
                list.innerHTML += `
                    <div class="page-item">
                        <div style="display:flex; justify-content:space-between">
                            <span><b>${i+1}. ${item.name}</b> ${i===0 ? '<span class="leader">🔥 ХИТ</span>' : ''}</span>
                            <span>${item.count} кликов</span>
                        </div>
                        <div class="bar-outer">
                            <div class="bar-inner" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        getStats();
    </script>
</body>
</html>
