<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитика - ShareWiki</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-card {
            background: #f8f9fa;
            border: 1px solid #a7d7f9;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .total-counter {
            font-size: 2em;
            font-weight: bold;
            color: #36c;
        }
        .bar-container {
            width: 100%;
            background-color: #eaecf0;
            border-radius: 10px;
            margin-top: 5px;
            height: 12px;
        }
        .bar-fill {
            height: 100%;
            background-color: #36c;
            border-radius: 10px;
            width: 0%;
            transition: width 1s ease-in-out;
        }
        .leader-badge {
            background: #ffcc00;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ShareWiki</h2>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="lesha.html">Леха</a></li>
            <li><a href="bblonde.html">bblonde</a></li>
            <li><a href="r34.html">@r34</a></li>
            <li><a href="amnesia.html">amnesia</a></li>
            <li><a href="revolution.html">Революция</a></li>
            <li><a href="analytics.html">📊 Аналитика</a></li>
        </ul>
    </div>
    <div class="content">
        <h1>Аналитика данных ShareWiki</h1>
        
        <div class="stats-card">
            <div>Общее количество просмотров всех статей:</div>
            <div class="total-counter" id="total-views">0</div>
        </div>

        <h2>Рейтинг популярности</h2>
        <p>Данные обновляются в реальном времени при каждой загрузке страницы.</p>
        
        <div id="analytics-list">
            Загрузка данных из архивов Share...
        </div>
    </div>

    <script>
        const pages = [
            { id: 'lesha', name: 'Леха (Навальный Киви)' },
            { id: 'bblonde', name: 'bblonde (Наггетсы)' },
            { id: 'r34', name: '@r34 (Подарочки)' },
            { id: 'amnesia', name: 'amnesia (Создатель)' },
            { id: 'revolution', name: 'Революция из-за приложения' }
        ];

        async function fetchStats() {
            const listContainer = document.getElementById('analytics-list');
            const totalDisplay = document.getElementById('total-views');
            let dataList = [];
            let total = 0;

            // 1. Собираем данные
            for (let page of pages) {
                try {
                    const response = await fetch(`https://api.counterapi.dev/v1/ShareWiki/${page.id}`);
                    const data = await response.json();
                    const count = data.count || 0;
                    dataList.push({ name: page.name, count: count });
                    total += count;
                } catch (e) {
                    dataList.push({ name: page.name, count: 0 });
                }
            }

            // 2. Сортируем (самые популярные сверху)
            dataList.sort((a, b) => b.count - a.count);

            // 3. Отрисовываем
            totalDisplay.innerText = total;
            listContainer.innerHTML = ''; // Очищаем текст загрузки

            const maxCount = dataList[0].count || 1; // Чтобы не делить на 0

            dataList.forEach((item, index) => {
                const percentage = (item.count / maxCount) * 100;
                const isLeader = index === 0 && item.count > 0;

                const pageRow = document.createElement('div');
                pageRow.style.marginBottom = "20px";
                pageRow.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>
                            <strong>${index + 1}. ${item.name}</strong>
                            ${isLeader ? '<span class="leader-badge">ТОП-1</span>' : ''}
                        </span>
                        <span class="view-count">${item.count} просмотров</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width: ${percentage}%"></div>
                    </div>
                `;
                listContainer.appendChild(pageRow);
            });
        }

        // Запуск
        fetchStats();
    </script>
</body>
</html>
